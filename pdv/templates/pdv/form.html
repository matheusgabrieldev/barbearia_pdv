{% extends "pdv/base.html" %}

{% block content %}
<div class="auth-shell">
    <div class="auth-card auth-card--compact">
        <h2>{{ titulo }}</h2>
        <form method="POST" class="panel-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-block">Salvar</button>
        </form>
    </div>
</div>
{% endblock %}
