{% extends 'pdv/base.html' %}

{% block content %}
<div class="form-box">
    <h2>Criar Novo Serviço</h2>
    <form method="POST">
        {% csrf_token %}
        <label for="{{ form.nome.id_for_label }}">Nome:</label>
        {{ form.nome }}

        <label for="{{ form.preco.id_for_label }}">Preço:</label>
        {{ form.preco }}

        <button type="submit">Salvar Serviço</button>
    </form>
</div>
{% endblock %}
